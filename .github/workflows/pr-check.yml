name: PR Check — Lint & Build Validation

on:
  pull_request:
    branches:
      - main
      - develop

jobs:
  pr-validation:
    name: Validate PR
    runs-on: ubuntu-22.04

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Check required files exist
        run: |
          FILES="index.html Dockerfile nginx.conf docker-compose.yml"
          ALL_OK=true
          for f in $FILES; do
            if [ -f "$f" ]; then
              echo "✅ $f"
            else
              echo "❌ $f — MISSING"
              ALL_OK=false
            fi
          done
          $ALL_OK || exit 1

      - name: Lint Dockerfile
        uses: hadolint/hadolint-action@v3.1.0
        with:
          dockerfile: Dockerfile
          failure-threshold: error

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image (PR check — no push)
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: demoapp:pr-${{ github.event.number }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Run container smoke test
        run: |
          docker run -d --name pr-test -p 8080:80 demoapp:pr-${{ github.event.number }}
          sleep 4
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080)
          echo "HTTP Status: $STATUS"
          [ "$STATUS" -eq 200 ] && echo "✅ Smoke test passed" || (docker logs pr-test && exit 1)
          docker stop pr-test && docker rm pr-test

      - name: Comment PR with build result
        if: always()
        uses: actions/github-script@v7
        with:
          script: |
            const status = '${{ job.status }}' === 'success'
              ? '✅ Build & smoke test **passed**. Ready to merge.'
              : '❌ Build or test **failed**. Check the [workflow logs](${{ github.server_url }}/${{ github.repository }}/actions/runs/${{ github.run_id }}).';
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: `### CI Check Result\n\n${status}\n\n**Commit:** \`${{ github.sha }}\``
            });
