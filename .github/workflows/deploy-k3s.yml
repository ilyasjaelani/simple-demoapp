name: Deploy to k3s

on:
  push:
    branches:
      - main

permissions:
  contents: read
  packages: write

env:
  IMAGE: ghcr.io/ilyasjaelani/simple-demoapp

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io -u ${{ github.actor }} --password-stdin

      - name: Build & push image
        id: build_step
        run: |
          # Buat tag
          TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
          
          # Build & Push
          docker build -t ${{ env.IMAGE }}:$TAG -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:$TAG
          docker push ${{ env.IMAGE }}:latest
          
          # --- BAGIAN KRUSIAL ---
          # Simpan ke GITHUB_ENV agar step 'Deploy' bisa baca
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV
      
      - name: Debug Env
        run: env | grep IMAGE  

      - name: Deploy to k3s
        run: |
          echo "Deploying version: ${{ env.IMAGE_TAG }}"
          
          # Cek jika kosong (untuk keamanan)
          if [ -z "${{ env.IMAGE_TAG }}" ]; then
            echo "Error: IMAGE_TAG is still empty!"
            exit 1
          fi

          # Eksekusi SED
          sed -i "s|image: ${{ env.IMAGE }}:.*|image: ${{ env.IMAGE }}:${{ env.IMAGE_TAG }}|g" deployment.yaml
          
          # Apply ke K8s
          kubectl apply -f deployment.yaml

      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/demoapp --timeout=120s

      - name: Verify
        run: |
          kubectl get pods -l app=demoapp