name: Deploy to k3s

on:
  push:
    branches:
      - main

env:
  IMAGE: ghcr.io/ilyasjaelani/simple-demoapp

jobs:
  deploy:
    name: Build, Push & Deploy
    runs-on: self-hosted        # pakai runner di mesin lokal

    steps:
      # ── 1. Ambil kode terbaru ──
      - name: Checkout
        uses: actions/checkout@v4

      # ── 2. Login ke GitHub Container Registry ──
      - name: Login to GHCR
        run: |
          echo "${{ secrets.GITHUB_TOKEN }}" | \
          docker login ghcr.io -u ${{ github.actor }} --password-stdin

      # ── 3. Build & push image dengan tag SHA commit ──
      - name: Build & push image
        run: |
          TAG=sha-$(echo ${{ github.sha }} | cut -c1-7)
          docker build -t ${{ env.IMAGE }}:$TAG -t ${{ env.IMAGE }}:latest .
          docker push ${{ env.IMAGE }}:$TAG
          docker push ${{ env.IMAGE }}:latest
          echo "IMAGE_TAG=$TAG" >> $GITHUB_ENV

      # ── 4. Update image di deployment ──
      - name: Deploy to k3s
        run: |
          kubectl set image deployment/demoapp \
            demoapp=${{ env.IMAGE }}:${{ env.IMAGE_TAG }}

      # ── 5. Tunggu rollout selesai ──
      - name: Wait for rollout
        run: |
          kubectl rollout status deployment/demoapp --timeout=120s

      # ── 6. Verifikasi pod berjalan ──
      - name: Verify
        run: |
          kubectl get pods -l app=demoapp