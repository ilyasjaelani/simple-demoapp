apiVersion: apps/v1
kind: Deployment
metadata:
  name: demoapp
  labels:
    app: demoapp
spec:
  replicas: 2
  selector:
    matchLabels:
      app: demoapp
  template:
    metadata:
      labels:
        app: demoapp
    spec:
      # Agar k3s bisa pull image private dari GHCR
      imagePullSecrets:
        - name: ghcr-secret
      containers:
      - name: demoapp
        image: ghcr.io/ilyasjaelani/simple-demoapp:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 80
        livenessProbe:
          httpGet:
            path: /
            port: 80
          initialDelaySeconds: 10
          periodSeconds: 30
---
apiVersion: v1
kind: Service
metadata:
  name: demoapp-service
spec:
  selector:
    app: demoapp
  ports:
    - protocol: TCP
      port: 8080        # Port yang diakses dari luar
      targetPort: 80    # Port aplikasi di dalam container
  type: NodePort